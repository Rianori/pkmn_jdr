<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Editeur de Scenario</title>
<style>
:root {
  --bg:#0e0e10; --surface:#141416; --card:#1a1a1e; --border:#2a2a30;
  --text:#e8e6e0; --muted:#6b6a6a; --amber:#c8922a; --amber-dim:rgba(200,146,42,.25);
  --amber-glow:rgba(200,146,42,.08); --danger:#8B3300; --safe:#1e5c2e;
  --radius:6px; --mono:'IBM Plex Mono',monospace; --sans:'Inter',system-ui,sans-serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); font-size:14px; }

header { display:flex; align-items:center; gap:16px; padding:14px 24px;
  background:var(--surface); border-bottom:1px solid var(--border);
  position:sticky; top:0; z-index:100; }
.back-link { font-family:var(--mono); font-size:11px; color:var(--muted);
  text-decoration:none; border:1px solid var(--border); border-radius:3px;
  padding:5px 12px; transition:color .15s,border-color .15s; }
.back-link:hover { color:var(--amber); border-color:var(--amber-dim); }
.hd-meta { flex:1; }
.hd-campaign { font-family:var(--mono); font-size:9px; letter-spacing:.12em;
  text-transform:uppercase; color:var(--muted); }
.hd-title-input { background:none; border:none; color:var(--amber);
  font-size:18px; font-weight:700; font-family:var(--sans); outline:none;
  width:100%; padding:2px 0; }
.hd-title-input:focus { border-bottom:1px solid var(--amber-dim); }
.save-btn { font-family:var(--mono); font-size:10px; letter-spacing:.06em;
  text-transform:uppercase; background:var(--amber-dim); color:var(--amber);
  border:1px solid var(--amber-dim); border-radius:4px; padding:7px 16px;
  cursor:pointer; transition:background .15s; }
.save-btn:hover { background:rgba(200,146,42,.4); }
.save-btn.saved { background:rgba(30,92,46,.3); color:#4caf6e; border-color:rgba(30,92,46,.4); }

.tagline-row { padding:10px 24px; background:var(--surface); border-bottom:1px solid var(--border); }
.tagline-input { background:none; border:none; color:var(--muted); font-style:italic;
  font-size:13px; font-family:var(--sans); outline:none; width:100%; }

.main { padding:24px; max-width:1400px; margin:0 auto; }

.acte-block { border:1px solid var(--border); border-radius:var(--radius);
  margin-bottom:20px; overflow:hidden; }
.acte-header { display:flex; align-items:center; gap:12px; padding:14px 18px;
  background:var(--card); border-bottom:1px solid var(--border); cursor:pointer; }
.acte-num { font-family:var(--mono); font-size:11px; font-weight:700; color:var(--amber);
  background:var(--amber-glow); border:1px solid var(--amber-dim); border-radius:3px;
  padding:3px 10px; flex-shrink:0; }
.acte-title-input { flex:1; background:none; border:none; color:var(--text);
  font-size:15px; font-weight:600; font-family:var(--sans); outline:none; }
.acte-chevron { font-size:11px; color:var(--amber); transition:transform .2s; flex-shrink:0; }
.acte-header.open .acte-chevron { transform:rotate(90deg); }
.acte-del-btn { font-family:var(--mono); font-size:10px; color:var(--muted);
  background:none; border:1px solid var(--border); border-radius:3px;
  padding:4px 10px; cursor:pointer; flex-shrink:0; }
.acte-del-btn:hover { color:#e57373; border-color:rgba(139,51,0,.4); }

.acte-body { display:none; padding:18px; }
.acte-body.open { display:block; }

.scene-block { border:1px solid var(--border); border-radius:4px;
  margin-bottom:14px; overflow:hidden; }
.scene-header { display:flex; align-items:center; gap:10px; padding:8px 14px;
  background:var(--surface); border-bottom:1px solid var(--border); }
.scene-num { font-family:var(--mono); font-size:10px; color:var(--muted);
  background:var(--bg); border:1px solid var(--border); border-radius:2px;
  padding:2px 8px; flex-shrink:0; }
.scene-title-input { flex:1; background:none; border:none; color:var(--text);
  font-size:13px; font-family:var(--sans); outline:none; }
.scene-del-btn { font-family:var(--mono); font-size:9px; color:var(--muted);
  background:none; border:none; cursor:pointer; padding:2px 6px; flex-shrink:0; }
.scene-del-btn:hover { color:#e57373; }

.scene-cols { display:grid; grid-template-columns:1fr 1fr; gap:0; }
.scene-col { padding:12px 14px; }
.scene-col:first-child { border-right:1px solid var(--border); }
.scene-col-label { font-family:var(--mono); font-size:8px; letter-spacing:.1em;
  text-transform:uppercase; color:var(--muted); margin-bottom:6px; display:block; }
.scene-col.notes .scene-col-label { color:var(--amber); }
.scene-textarea { width:100%; min-height:140px; background:var(--bg);
  border:1px solid var(--border); border-radius:3px; color:var(--text);
  font-size:13px; font-family:var(--sans); padding:10px; resize:vertical;
  outline:none; line-height:1.5; transition:border-color .15s; }
.scene-textarea:focus { border-color:var(--amber-dim); }
.scene-col.notes .scene-textarea { border-color:rgba(200,146,42,.15); }

.add-scene-btn { font-family:var(--mono); font-size:10px; letter-spacing:.04em;
  background:none; border:1px dashed var(--border); border-radius:3px;
  color:var(--muted); padding:8px 16px; cursor:pointer; width:100%;
  transition:border-color .15s,color .15s; margin-top:4px; }
.add-scene-btn:hover { border-color:var(--amber-dim); color:var(--amber); }

.add-acte-btn { font-family:var(--mono); font-size:11px; letter-spacing:.04em;
  background:none; border:1px dashed var(--border); border-radius:var(--radius);
  color:var(--muted); padding:14px 18px; cursor:pointer; width:100%;
  transition:border-color .15s,color .15s; }
.add-acte-btn:hover { border-color:var(--amber-dim); color:var(--amber); }

.empty-state { text-align:center; padding:60px 20px; color:var(--muted); font-size:13px; }
</style>
</head>
<body>

<header>
  <a href="mj.html" class="back-link">&#8592; Scenarios</a>
  <div class="hd-meta">
    <div class="hd-campaign" id="hd-campaign-label">Campagne 00</div>
    <input class="hd-title-input" id="sc-title" placeholder="Titre du scenario" value="Scenario de test">
  </div>
  <button class="save-btn" id="save-btn" onclick="saveScenario()">Sauvegarder</button>
</header>

<div class="tagline-row">
  <input class="tagline-input" id="sc-tagline" placeholder="Accroche du scenario..." value="Une accroche de demonstration pour valider le concept.">
</div>

<div class="main" id="actes-container"></div>

<div style="max-width:1400px;margin:0 auto;padding:0 24px 40px">
  <button class="add-acte-btn" onclick="addActe()">+ Nouvel Acte</button>
</div>

<script>
var SCENARIO_ID = 'test-scenario';
var FB = 'https://savage-pokemon-default-rtdb.europe-west1.firebasedatabase.app';

var state = {
  title: 'Scenario de test',
  tagline: '',
  campagne: 0,
  actes: []
};

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,7);
}

function addActe() {
  state.actes.push({ id: uid(), title: 'Nouvel acte', scenes: [] });
  render();
  renumber();
}

function addScene(acteId) {
  var acte = state.actes.find(function(a){ return a.id === acteId; });
  if (!acte) return;
  acte.scenes.push({ id: uid(), title: 'Nouvelle scene', histoire: '', notes: '' });
  render();
  renumber();
}

function deleteActe(acteId) {
  if (!confirm('Supprimer cet acte et toutes ses scenes ?')) return;
  state.actes = state.actes.filter(function(a){ return a.id !== acteId; });
  render();
  renumber();
}

function deleteScene(acteId, sceneId) {
  var acte = state.actes.find(function(a){ return a.id === acteId; });
  if (!acte) return;
  if (!confirm('Supprimer cette scene ?')) return;
  acte.scenes = acte.scenes.filter(function(s){ return s.id !== sceneId; });
  render();
  renumber();
}

function toggleActe(acteId) {
  var header = document.getElementById('acte-hd-' + acteId);
  var body = document.getElementById('acte-body-' + acteId);
  if (!header || !body) return;
  header.classList.toggle('open');
  body.classList.toggle('open');
}

function render() {
  var container = document.getElementById('actes-container');
  if (!state.actes.length) {
    container.innerHTML = '<div class="empty-state">Aucun acte pour le moment. Cliquez sur "+ Nouvel Acte" pour commencer.</div>';
    return;
  }

  var html = '';
  state.actes.forEach(function(acte, ai) {
    var acteNum = 'Acte ' + (ai + 1);
    html += '<div class="acte-block">'
      + '<div class="acte-header open" id="acte-hd-' + acte.id + '" onclick="toggleActe(\'' + acte.id + '\')">'
      + '<span class="acte-num">' + acteNum + '</span>'
      + '<input class="acte-title-input" data-acte="' + acte.id + '" value="' + escAttr(acte.title) + '" onclick="event.stopPropagation()">'
      + '<span class="acte-chevron">&#9654;</span>'
      + '<button class="acte-del-btn" onclick="event.stopPropagation();deleteActe(\'' + acte.id + '\')">Suppr.</button>'
      + '</div>'
      + '<div class="acte-body open" id="acte-body-' + acte.id + '">';

    acte.scenes.forEach(function(scene, si) {
      var sceneNum = (ai + 1) + '.' + (si + 1);
      html += '<div class="scene-block">'
        + '<div class="scene-header">'
        + '<span class="scene-num">Scene ' + sceneNum + '</span>'
        + '<input class="scene-title-input" data-acte="' + acte.id + '" data-scene="' + scene.id + '" data-field="title" value="' + escAttr(scene.title) + '">'
        + '<button class="scene-del-btn" onclick="deleteScene(\'' + acte.id + '\',\'' + scene.id + '\')">&#10005;</button>'
        + '</div>'
        + '<div class="scene-cols">'
        + '<div class="scene-col histoire">'
        + '<span class="scene-col-label">Histoire</span>'
        + '<textarea class="scene-textarea" data-acte="' + acte.id + '" data-scene="' + scene.id + '" data-field="histoire" placeholder="Deroulement narratif de la scene...">' + escHtml(scene.histoire) + '</textarea>'
        + '</div>'
        + '<div class="scene-col notes">'
        + '<span class="scene-col-label">Notes MJ</span>'
        + '<textarea class="scene-textarea" data-acte="' + acte.id + '" data-scene="' + scene.id + '" data-field="notes" placeholder="Reperes, difficultes, secrets...">' + escHtml(scene.notes) + '</textarea>'
        + '</div>'
        + '</div>'
        + '</div>';
    });

    html += '<button class="add-scene-btn" onclick="addScene(\'' + acte.id + '\')">+ Nouvelle Scene</button>'
      + '</div>'
      + '</div>';
  });

  container.innerHTML = html;
  attachListeners();
}

function attachListeners() {
  document.querySelectorAll('.acte-title-input').forEach(function(inp) {
    inp.addEventListener('input', function() {
      var acte = state.actes.find(function(a){ return a.id === this.dataset.acte; }.bind(this));
      if (acte) acte.title = this.value;
    });
  });
  document.querySelectorAll('[data-scene]').forEach(function(el) {
    el.addEventListener('input', function() {
      var acte = state.actes.find(function(a){ return a.id === this.dataset.acte; }.bind(this));
      if (!acte) return;
      var scene = acte.scenes.find(function(s){ return s.id === this.dataset.scene; }.bind(this));
      if (!scene) return;
      scene[this.dataset.field] = this.value;
    });
  });
}

function renumber() {
  // La numerotation est recalculee a chaque render() via les index ai/si
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function escAttr(s) {
  return escHtml(s).replace(/"/g,'&quot;');
}

function saveScenario() {
  state.title = document.getElementById('sc-title').value;
  state.tagline = document.getElementById('sc-tagline').value;

  var btn = document.getElementById('save-btn');
  fetch(FB + '/scenarios_test/' + SCENARIO_ID + '.json', {
    method: 'PUT',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(state)
  }).then(function() {
    btn.textContent = '\u2713 Sauvegarde';
    btn.classList.add('saved');
    setTimeout(function() {
      btn.textContent = 'Sauvegarder';
      btn.classList.remove('saved');
    }, 1800);
  }).catch(function() {
    alert('Erreur de sauvegarde');
  });
}

function loadScenario() {
  fetch(FB + '/scenarios_test/' + SCENARIO_ID + '.json')
    .then(function(r){ return r.json(); })
    .then(function(data) {
      if (data) {
        state = data;
        if (!state.actes) state.actes = [];
        document.getElementById('sc-title').value = state.title || '';
        document.getElementById('sc-tagline').value = state.tagline || '';
      }
      render();
    })
    .catch(function() { render(); });
}

loadScenario();
</script>
</body>
</html>
