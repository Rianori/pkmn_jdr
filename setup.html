<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup — La Ville Morte</title>
<style>
:root { --bg:#0e0e0f; --surface:#161618; --card:#1c1c1f; --border:#2a2a2e;
  --amber:#c8922a; --amber-dim:#7a5510; --text:#d4cfc5; --muted:#6b6660;
  --safe:#1e5c2e; --danger:#8b2020; --mono:'JetBrains Mono',monospace; --sans:system-ui,sans-serif; }
body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh;
  display:flex; align-items:center; justify-content:center; padding:24px; }
.box { background:var(--card); border:1px solid var(--border); border-radius:8px;
  padding:28px 32px; max-width:540px; width:100%; }
h1 { font-family:var(--mono); font-size:15px; color:var(--amber); margin-bottom:14px; }
p { font-size:13px; color:var(--muted); line-height:1.6; margin-bottom:16px; }
.btn { background:var(--amber-dim); color:var(--amber); border:1px solid var(--amber-dim);
  border-radius:4px; font-family:var(--mono); font-size:12px; padding:10px 20px;
  cursor:pointer; width:100%; transition:background .12s; margin-bottom:12px; }
.btn:hover { background:var(--amber); color:#1a1000; }
.btn-copy { background:none; color:var(--muted); border:1px solid var(--border);
  border-radius:4px; font-family:var(--mono); font-size:11px; padding:7px 16px;
  cursor:pointer; width:100%; transition:color .12s,border-color .12s; }
.btn-copy:hover { color:var(--amber); border-color:var(--amber-dim); }
.status { font-size:12px; margin:8px 0; min-height:18px; }
.ok { color:var(--safe); }
.err { color:var(--danger); }
.warn { color:var(--amber); }
.result-box { background:var(--surface); border:1px solid var(--amber-dim); border-radius:6px;
  padding:16px; margin-top:12px; display:none; }
.id-display { font-family:var(--mono); font-size:13px; color:var(--amber);
  word-break:break-all; background:var(--bg); padding:10px 12px; border-radius:4px;
  margin-bottom:10px; }
.raw-box { background:var(--bg); border:1px solid var(--border); border-radius:4px;
  padding:10px; font-family:var(--mono); font-size:11px; color:var(--muted);
  word-break:break-all; white-space:pre-wrap; max-height:200px; overflow-y:auto;
  margin-top:10px; display:none; }
.label { font-family:var(--mono); font-size:9px; letter-spacing:.1em; text-transform:uppercase;
  color:var(--muted); margin-bottom:5px; }
</style>
</head>
<body>
<div class="box">
  <h1>Configuration du canal MJ/Joueurs</h1>
  <p>Cliquez sur le bouton pour creer le canal de communication. A faire une seule fois depuis votre navigateur.</p>

  <button class="btn" onclick="createRegistry()">Creer le canal JSONBin</button>
  <div class="status" id="status"></div>

  <div class="result-box" id="result-box">
    <div class="label">ID du canal — copiez et envoyez a Claude</div>
    <div class="id-display" id="result-id"></div>
    <button class="btn-copy" onclick="copyId()">Copier l'ID</button>
    <div style="margin-top:10px">
      <div class="label" style="cursor:pointer" onclick="toggleRaw()">Reponse brute (debug) ▼</div>
      <div class="raw-box" id="raw-box"></div>
    </div>
  </div>
</div>
<script>
var KEY = '$2a$10$WYyryseWygh/sqmPChGh8.8o5.D26YYtfK8ftu2OIZyiKjcW2pNty';

function setStatus(msg, cls) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + (cls||'');
}

function createRegistry() {
  setStatus('Connexion a JSONBin...', 'warn');

  var existing = localStorage.getItem('jdr_central_bin');
  if (existing) {
    showResult(existing, 'Recupere depuis la memoire locale');
    setStatus('Canal existant trouve dans la memoire locale.', 'ok');
    return;
  }

  fetch('https://api.jsonbin.io/v3/b', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': KEY,
      'X-Bin-Name': 'jdr-central-registry',
      'X-Bin-Private': 'true'
    },
    body: JSON.stringify({
      registry: {},
      mj_notes: {},
      created: new Date().toISOString()
    })
  })
  .then(function(resp) {
    setStatus('Reponse recue (HTTP ' + resp.status + ')...', 'warn');
    return resp.text().then(function(text) {
      document.getElementById('raw-box').textContent = text;
      document.getElementById('raw-box').style.display = 'block';
      try {
        var data = JSON.parse(text);
        return data;
      } catch(e) {
        throw new Error('Reponse non-JSON: ' + text.substring(0, 100));
      }
    });
  })
  .then(function(data) {
    var id = null;
    /* JSONBin v3 */
    if (data.metadata && data.metadata.id) id = data.metadata.id;
    /* Fallback v2 */
    else if (data.id) id = data.id;
    /* Autre format */
    else if (data._id) id = data._id;

    if (!id) {
      throw new Error('Structure inattendue. Voir reponse brute ci-dessous.');
    }

    localStorage.setItem('jdr_central_bin', id);
    showResult(id, 'Canal cree avec succes !');
    setStatus('Canal cree avec succes !', 'ok');
  })
  .catch(function(e) {
    setStatus('Erreur: ' + e.message, 'err');
  });
}

function showResult(id, msg) {
  document.getElementById('result-id').textContent = id;
  document.getElementById('result-box').style.display = 'block';
}

function copyId() {
  var id = document.getElementById('result-id').textContent;
  navigator.clipboard.writeText(id).then(function() {
    var btn = event.target;
    var orig = btn.textContent;
    btn.textContent = 'Copie !';
    setTimeout(function() { btn.textContent = orig; }, 2000);
  }).catch(function() {
    /* Fallback */
    var el = document.getElementById('result-id');
    var range = document.createRange();
    range.selectNode(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
  });
}

function toggleRaw() {
  var box = document.getElementById('raw-box');
  box.style.display = box.style.display === 'none' ? 'block' : 'none';
}

window.onload = function() {
  var existing = localStorage.getItem('jdr_central_bin');
  if (existing) {
    showResult(existing);
    setStatus('Canal existant en memoire locale.', 'ok');
  }
};
</script>
</body>
</html>
