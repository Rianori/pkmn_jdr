<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Setup JSONBin</title>
<style>
body{background:#0e0e0f;color:#d4cfc5;font-family:system-ui,sans-serif;padding:24px;max-width:600px;margin:0 auto;}
h1{color:#c8922a;font-size:16px;margin-bottom:12px;}
p{color:#6b6660;font-size:13px;margin-bottom:16px;line-height:1.6;}
button{background:#7a5510;color:#c8922a;border:1px solid #7a5510;border-radius:4px;font-size:13px;padding:10px 20px;cursor:pointer;width:100%;margin-bottom:8px;}
button:hover{background:#c8922a;color:#1a1000;}
textarea{width:100%;min-height:200px;background:#161618;border:1px solid #2a2a2e;border-radius:4px;color:#d4cfc5;font-family:monospace;font-size:12px;padding:10px;resize:vertical;margin-top:8px;}
.ok{color:#1e5c2e;}
.err{color:#8b2020;}
.warn{color:#c8922a;}
#log{font-size:13px;margin:8px 0;min-height:20px;}
#id-box{background:#161618;border:1px solid #7a5510;border-radius:4px;padding:12px;font-family:monospace;font-size:14px;color:#c8922a;word-break:break-all;margin:10px 0;display:none;}
</style>
</head>
<body>
<h1>Setup canal JSONBin</h1>
<p>Cliquez pour creer le canal. La reponse brute s'affichera pour diagnostic.</p>

<button onclick="testKey()">1. Tester la cle (GET /v3/b)</button>
<button onclick="createBin()">2. Creer le bin (POST /v3/b)</button>
<div id="log"></div>
<div id="id-box"></div>
<label style="font-size:12px;color:#6b6660">Reponse brute :</label>
<textarea id="raw" readonly placeholder="La reponse apparaitra ici..."></textarea>

<script>
var KEY = '$2a$10$Ry6RRhIB06qneHc4RHKo0Oc/WPpteZZlQYOVu5i6PZVZ/d50jXY.C';

function log(msg, cls) {
  var el = document.getElementById('log');
  el.textContent = msg;
  el.className = cls || '';
}

function testKey() {
  log('Test GET /v3/b en cours...', 'warn');
  document.getElementById('raw').value = '';
  fetch('https://api.jsonbin.io/v3/b', {
    method: 'GET',
    headers: { 'X-Master-Key': KEY }
  })
  .then(function(r) {
    log('HTTP ' + r.status + ' ' + r.statusText, r.ok ? 'ok' : 'err');
    return r.text();
  })
  .then(function(t) { document.getElementById('raw').value = t; })
  .catch(function(e) { log('Erreur reseau: ' + e, 'err'); document.getElementById('raw').value = e.toString(); });
}

function createBin() {
  log('POST /v3/b en cours...', 'warn');
  document.getElementById('raw').value = '';
  document.getElementById('id-box').style.display = 'none';

  fetch('https://api.jsonbin.io/v3/b', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': KEY,
      'X-Bin-Name': 'jdr-central',
      'X-Bin-Private': 'false'
    },
    body: JSON.stringify({ registry: {}, created: new Date().toISOString() })
  })
  .then(function(r) {
    log('HTTP ' + r.status + ' ' + r.statusText, r.ok ? 'ok' : 'err');
    return r.text();
  })
  .then(function(t) {
    document.getElementById('raw').value = t;
    try {
      var d = JSON.parse(t);
      var id = (d.metadata && d.metadata.id) || d.id || d._id || null;
      if (id) {
        localStorage.setItem('jdr_central_bin', id);
        var box = document.getElementById('id-box');
        box.textContent = 'ID : ' + id;
        box.style.display = 'block';
        log('Succes ! ID recupere : ' + id, 'ok');
      } else {
        log('ID introuvable dans la reponse. Voir le JSON ci-dessous.', 'err');
      }
    } catch(e) {
      log('Reponse non-JSON. Voir ci-dessous.', 'err');
    }
  })
  .catch(function(e) {
    log('Erreur fetch : ' + e, 'err');
    document.getElementById('raw').value = e.toString();
  });
}

// Auto-charger si deja configure
window.onload = function() {
  var ex = localStorage.getItem('jdr_central_bin');
  if (ex) {
    var box = document.getElementById('id-box');
    box.textContent = 'ID existant : ' + ex;
    box.style.display = 'block';
    log('Canal deja configure en memoire locale.', 'ok');
  }
};
</script>
</body>
</html>
