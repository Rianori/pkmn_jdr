<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokedex des Attaques — Savage Pokemon</title>
<style>
:root {
  --bg:#0e0e10;--surface:#141416;--card:#1a1a1e;--border:#2a2a30;
  --text:#e8e6e0;--muted:#6b6a6a;--amber:#c8922a;--amber-dim:rgba(200,146,42,.25);
  --amber-glow:rgba(200,146,42,.08);--danger:#8B3300;
  --radius:6px;--mono:'IBM Plex Mono',monospace;--sans:'Inter',system-ui,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;}

header{display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:100;}
.hd-title{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--amber);}
.hd-count{font-size:11px;color:var(--muted);margin-left:10px;}
.hd-right{display:flex;align-items:center;gap:10px;}

/* Barre de contrôles */
.controls{padding:14px 24px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.search-input{flex:1;min-width:200px;background:var(--card);border:1px solid var(--border);
  border-radius:4px;color:var(--text);font-family:var(--sans);font-size:13px;
  padding:7px 12px;outline:none;transition:border-color .15s;}
.search-input:focus{border-color:var(--amber-dim);}
.btn{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;
  background:none;border:1px solid var(--border);border-radius:3px;
  color:var(--muted);padding:6px 14px;cursor:pointer;transition:color .12s,border-color .12s;}
.btn:hover{color:var(--amber);border-color:var(--amber-dim);}
.btn.primary{background:var(--amber-dim);color:var(--amber);border-color:var(--amber-dim);}
.btn.primary:hover{background:rgba(200,146,42,.4);}
.btn.danger{color:#e57373;border-color:rgba(139,51,0,.4);}
.btn.danger:hover{background:rgba(139,51,0,.15);}

/* Table */
.main{padding:20px 24px;}
.table-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius);}
table{width:100%;border-collapse:collapse;}
thead th{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);text-align:left;padding:10px 14px;border-bottom:1px solid var(--border);
  background:var(--surface);white-space:nowrap;cursor:pointer;user-select:none;}
thead th:hover{color:var(--amber);}
thead th.sorted{color:var(--amber);}
thead th .sort-arrow{margin-left:4px;opacity:.5;}
thead th.sorted .sort-arrow{opacity:1;}
tbody tr{border-bottom:1px solid #1a1a1e;transition:background .1s;}
tbody tr:hover{background:var(--card);}
tbody tr.editing{background:rgba(200,146,42,.05);border-color:var(--amber-dim);}
tbody td{padding:9px 14px;color:#a8a39a;vertical-align:top;font-size:13px;line-height:1.5;}
td.atk-name{color:var(--text);font-weight:600;font-family:var(--mono);font-size:12px;min-width:160px;}
td.atk-dmg{font-family:var(--mono);color:var(--amber);font-size:12px;white-space:nowrap;}
td.atk-range{white-space:nowrap;min-width:80px;}
td.atk-effect{min-width:200px;}
td.atk-actions{white-space:nowrap;text-align:right;padding-right:10px;}

/* Inputs inline édition */
.td-input{width:100%;background:var(--surface);border:1px solid var(--amber-dim);
  border-radius:3px;color:var(--text);font-size:12px;padding:3px 7px;outline:none;}
.td-input.mono{font-family:var(--mono);color:var(--amber);}
.td-input.name-input{font-family:var(--mono);font-weight:600;}

/* Boutons action par ligne */
.row-btn{font-family:var(--mono);font-size:9px;background:none;border:1px solid var(--border);
  border-radius:2px;color:var(--muted);padding:2px 7px;cursor:pointer;margin-left:4px;
  transition:color .1s,border-color .1s;}
.row-btn:hover{color:var(--amber);border-color:var(--amber-dim);}
.row-btn.save{color:#4caf6e;border-color:rgba(45,110,53,.4);}
.row-btn.save:hover{background:rgba(45,110,53,.1);}
.row-btn.del{color:#e57373;border-color:rgba(139,51,0,.3);}
.row-btn.del:hover{background:rgba(139,51,0,.1);}

/* Modal ajout */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;
  align-items:center;justify-content:center;}
.modal-bg.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:24px;width:100%;max-width:520px;}
.modal-title{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--amber);margin-bottom:16px;}
.field{margin-bottom:12px;}
.field label{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);display:block;margin-bottom:4px;}
.field input,.field textarea{width:100%;background:var(--surface);border:1px solid var(--border);
  border-radius:3px;color:var(--text);font-size:13px;padding:7px 10px;outline:none;
  transition:border-color .12s;}
.field input:focus,.field textarea:focus{border-color:var(--amber-dim);}
.field textarea{resize:vertical;min-height:60px;}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;}
.empty{text-align:center;padding:40px;color:var(--muted);font-size:13px;font-style:italic;}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center">
    <span class="hd-title">Pok&eacute;dex des Attaques</span>
    <span class="hd-count" id="hd-count"></span>
  </div>
  <div class="hd-right">
    <button class="btn primary" onclick="openModal()">+ Ajouter</button>
    <button class="btn" onclick="exportData()">&#8659; Exporter</button>
    <a href="mj.html" style="font-family:var(--mono);font-size:11px;color:var(--muted);
      text-decoration:none;border:1px solid var(--border);border-radius:2px;padding:5px 12px;">&#8592; MJ</a>
  </div>
</header>

<div class="controls">
  <input class="search-input" id="search" type="text" placeholder="Rechercher une attaque, dommages, effet..." oninput="renderTable()">
  <button class="btn" onclick="sortBy('name')">Nom</button>
  <button class="btn" onclick="sortBy('dmg')">Dommages</button>
  <button class="btn" onclick="clearSearch()">&#10005; Effacer</button>
</div>

<div class="main">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th onclick="sortBy('name')">Attaque <span class="sort-arrow" id="arrow-name"></span></th>
          <th onclick="sortBy('dmg')">Dommages <span class="sort-arrow" id="arrow-dmg"></span></th>
          <th onclick="sortBy('range')">Port&eacute;e <span class="sort-arrow" id="arrow-range"></span></th>
          <th>Effet</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="empty" style="display:none">Aucune attaque trouv&eacute;e.</div>
  </div>
</div>

<!-- Modal ajout -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-title">Nouvelle attaque</div>
    <div class="field"><label>Nom de l'attaque *</label><input id="f-name" type="text" placeholder="Ex: Lance-Flammes"></div>
    <div class="field"><label>Dommages</label><input id="f-dmg" type="text" placeholder="Ex: 2d8, FOR+d6"></div>
    <div class="field"><label>Port&eacute;e</label><input id="f-range" type="text" placeholder="Ex: 12&quot;/24&quot;, M&ecirc;l&eacute;e"></div>
    <div class="field"><label>Effet</label><textarea id="f-effect" placeholder="Description de l'effet..."></textarea></div>
    <div class="field"><label>Source (Pok&eacute;mon)</label><input id="f-source" type="text" placeholder="Optionnel"></div>
    <div class="modal-btns">
      <button class="btn" onclick="closeModal()">Annuler</button>
      <button class="btn primary" onclick="addAttack()">Ajouter</button>
    </div>
  </div>
</div>

var attacks = [];

/* ── Init ──────────────────────────────────────────────────────────────── */
function init() {
  fetch(FB_NODE)
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data && Array.isArray(data) && data.length) {
        attacks = data;
      } else if (data && typeof data === 'object' && !Array.isArray(data)) {
        // Firebase peut renvoyer un objet
        attacks = Object.values(data).filter(function(a){ return a && a.name; });
      } else {
        // Premier chargement : utiliser les données du bestiaire
        attacks = SEED.map(function(a, i) { return Object.assign({id: i+1}, a); });
        save();
      }
      renderTable();
    })
    .catch(function() {
      attacks = SEED.map(function(a, i) { return Object.assign({id: i+1}, a); });
      renderTable();
    });
}

function save() {
  fetch(FB_NODE, {
    method: 'PUT',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(attacks)
  }).catch(function(){});
}

/* ── Rendu table ───────────────────────────────────────────────────────── */
function renderTable() {
  var q = (document.getElementById('search').value || '').toLowerCase();
  var filtered = attacks.filter(function(a) {
    return !q || a.name.toLowerCase().indexOf(q) >= 0
              || (a.dmg||'').toLowerCase().indexOf(q) >= 0
              || (a.effect||'').toLowerCase().indexOf(q) >= 0
              || (a.range||'').toLowerCase().indexOf(q) >= 0;
  });

  filtered.sort(function(a,b) {
    var va = (a[_sortKey]||'').toLowerCase();
    var vb = (b[_sortKey]||'').toLowerCase();
    return _sortAsc ? va.localeCompare(vb,'fr') : vb.localeCompare(va,'fr');
  });

  var tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  document.getElementById('empty').style.display = filtered.length ? 'none' : 'block';
  document.getElementById('hd-count').textContent = ' — ' + filtered.length + ' / ' + attacks.length + ' attaques';

  filtered.forEach(function(a) {
    var tr = document.createElement('tr');
    if (_editing[a.id]) {
      tr.className = 'editing';
      tr.innerHTML =
        '<td><input class="td-input name-input" id="e-name-' + a.id + '" value="' + esc(a.name) + '"></td>'
        + '<td><input class="td-input mono" id="e-dmg-' + a.id + '" value="' + esc(a.dmg||'') + '" style="max-width:120px"></td>'
        + '<td><input class="td-input" id="e-range-' + a.id + '" value="' + esc(a.range||'') + '" style="max-width:100px"></td>'
        + '<td><input class="td-input" id="e-effect-' + a.id + '" value="' + esc(a.effect||'') + '"></td>'
        + '<td class="atk-actions">'
        + '<button class="row-btn save" onclick="saveEdit(' + a.id + ')">&#10003;</button>'
        + '<button class="row-btn" onclick="cancelEdit(' + a.id + ')">&#10005;</button>'
        + '</td>';
    } else {
      tr.innerHTML =
        '<td class="atk-name">' + esc(a.name) + '</td>'
        + '<td class="atk-dmg">'   + esc(a.dmg||'&mdash;') + '</td>'
        + '<td class="atk-range">' + esc(a.range||'&mdash;') + '</td>'
        + '<td class="atk-effect">' + esc(a.effect||'') + '</td>'
        + '<td class="atk-actions">'
        + '<button class="row-btn" onclick="startEdit(' + a.id + ')">&#9998;</button>'
        + '<button class="row-btn del" onclick="deleteAttack(' + a.id + ')">&#10007;</button>'
        + '</td>';
    }
    tbody.appendChild(tr);
  });

  updateArrows();
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ── Tri ───────────────────────────────────────────────────────────────── */
function sortBy(key) {
  if (_sortKey === key) { _sortAsc = !_sortAsc; }
  else { _sortKey = key; _sortAsc = true; }
  renderTable();
}

function updateArrows() {
  ['name','dmg','range'].forEach(function(k) {
    var el = document.getElementById('arrow-' + k);
    if (!el) return;
    if (_sortKey === k) el.textContent = _sortAsc ? '▲' : '▼';
    else el.textContent = '';
    el.closest('th').classList.toggle('sorted', _sortKey === k);
  });
}

function clearSearch() {
  document.getElementById('search').value = '';
  renderTable();
}

/* ── Edition inline ────────────────────────────────────────────────────── */
function startEdit(id) {
  _editing[id] = true;
  renderTable();
  var el = document.getElementById('e-name-' + id);
  if (el) el.focus();
}

function cancelEdit(id) {
  delete _editing[id];
  renderTable();
}

function saveEdit(id) {
  var idx = attacks.findIndex(function(a){ return a.id === id; });
  if (idx < 0) return;
  var name = (document.getElementById('e-name-' + id)||{}).value || '';
  if (!name.trim()) { alert('Le nom est requis.'); return; }
  attacks[idx].name   = name.trim();
  attacks[idx].dmg    = (document.getElementById('e-dmg-'   + id)||{}).value || '';
  attacks[idx].range  = (document.getElementById('e-range-' + id)||{}).value || '';
  attacks[idx].effect = (document.getElementById('e-effect-'+ id)||{}).value || '';
  delete _editing[id];
  save();
  renderTable();
}

function deleteAttack(id) {
  var a = attacks.find(function(x){ return x.id === id; });
  if (!a) return;
  if (!confirm('Supprimer "' + a.name + '" ?')) return;
  attacks = attacks.filter(function(x){ return x.id !== id; });
  save();
  renderTable();
}

/* ── Ajout ─────────────────────────────────────────────────────────────── */
function openModal() {
  ['f-name','f-dmg','f-range','f-effect','f-source'].forEach(function(id){
    document.getElementById(id).value = '';
  });
  document.getElementById('modal-bg').classList.add('open');
  document.getElementById('f-name').focus();
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-bg')) {
    document.getElementById('modal-bg').classList.remove('open');
  }
}

function addAttack() {
  var name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Le nom est requis.'); return; }
  var maxId = attacks.reduce(function(m, a){ return Math.max(m, a.id||0); }, 0);
  attacks.push({
    id:     maxId + 1,
    name:   name,
    dmg:    document.getElementById('f-dmg').value.trim(),
    range:  document.getElementById('f-range').value.trim(),
    effect: document.getElementById('f-effect').value.trim(),
    source: document.getElementById('f-source').value.trim()
  });
  attacks.sort(function(a,b){ return a.name.localeCompare(b.name,'fr'); });
  save();
  closeModal();
  renderTable();
}

/* ── Export JSON ───────────────────────────────────────────────────────── */
function exportData() {
  var blob = new Blob([JSON.stringify(attacks, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'attaques-pokemon.json';
  a.click();
}

init();
</script>
</body>
</html>
