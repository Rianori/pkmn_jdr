<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test navigation</title>
<style>
:root { --amber: #c8922a; --bg: #0e0e0f; --text: #d4cfc5; --muted: #6b6660; --border: #2a2a2e; --surface: #161618; }
body { background: var(--bg); color: var(--text); font-family: monospace; margin: 0; }
nav { display: flex; gap: 4px; padding: 12px; background: var(--surface); border-bottom: 1px solid var(--border); }
nav button { background: none; border: none; color: var(--muted); padding: 8px 16px; cursor: pointer; font-family: monospace; border-bottom: 2px solid transparent; }
nav button.active { color: var(--amber); border-bottom-color: var(--amber); }
.tab { display: none; padding: 24px; }
.tab.active { display: block; }
</style>
</head>
<body>
<nav>
  <button class="active" onclick="show('a',this)">Onglet A</button>
  <button onclick="show('b',this)">Onglet B</button>
  <button onclick="show('c',this)">Onglet C</button>
</nav>
<div class="tab active" id="tab-a"><h2>Contenu A</h2><p>Cet onglet fonctionne.</p></div>
<div class="tab" id="tab-b"><h2>Contenu B</h2><p>Si tu vois ça, la navigation fonctionne !</p></div>
<div class="tab" id="tab-c"><h2>Contenu C</h2><p>Onglet C visible.</p></div>
<script>
function show(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  btn.classList.add('active');
}
</script>
</body>
</html>
