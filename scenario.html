<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scenarios — La Ville Morte</title>
<style>
:root {
  --bg:#0e0e0f; --surface:#161618; --card:#1c1c1f; --border:#2a2a2e;
  --amber:#c8922a; --amber-dim:#7a5510; --amber-glow:#c8922a22;
  --text:#d4cfc5; --muted:#6b6660; --danger:#8b2020; --safe:#1e5c2e;
  --sans:'Inter',system-ui,sans-serif; --mono:'JetBrains Mono',monospace;
  --radius:8px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:15px;min-height:100vh;display:flex;flex-direction:column;}
header{display:flex;align-items:center;gap:14px;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;}
.logo{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
.header-title{font-family:var(--mono);font-size:14px;font-weight:600;color:var(--amber);}
.back-link{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted);text-decoration:none;border:1px solid var(--border);border-radius:4px;padding:5px 12px;transition:color .15s,border-color .15s;}
.back-link:hover{color:var(--amber);border-color:var(--amber-dim);}
.app{display:flex;flex:1;overflow:hidden;}
/* SIDEBAR */
.sc-sidebar{width:240px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;}
.sc-sidebar-header{padding:14px 16px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;justify-content:space-between;}
.sc-new-btn{background:var(--amber-dim);color:var(--amber);border:1px solid var(--amber-dim);border-radius:4px;font-family:var(--mono);font-size:10px;padding:4px 10px;cursor:pointer;}
.sc-new-btn:hover{background:var(--amber);color:#1a1000;}
.sc-list{flex:1;padding:8px;}
.sc-list-item{padding:10px 12px;border-radius:6px;cursor:pointer;margin-bottom:4px;border:1px solid transparent;transition:background .12s,border-color .12s;}
.sc-list-item:hover{background:var(--card);}
.sc-list-item.active{background:var(--card);border-color:var(--amber-dim);}
.sc-item-title{font-family:var(--mono);font-size:12px;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sc-item-meta{font-size:10px;color:var(--muted);}
.sc-del-btn{float:right;background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:0 2px;line-height:1;}
.sc-del-btn:hover{color:var(--danger);}
/* EDITOR */
.sc-editor{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.sc-editor-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-style:italic;}
.sc-editor-form{flex:1;display:flex;flex-direction:column;overflow-y:auto;padding:24px 28px 100px;}
.field-label{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:6px;}
.session-title-input{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--amber);font-family:var(--mono);font-size:18px;font-weight:600;padding:11px 16px;margin-bottom:28px;transition:border-color .15s;}
.session-title-input:focus{outline:none;border-color:var(--amber-dim);}
.chapters-list{display:flex;flex-direction:column;gap:14px;}
.chapter-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.chapter-header{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--surface);border-bottom:1px solid var(--border);}
.chapter-num{font-family:var(--mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);flex-shrink:0;}
.chapter-title-input{flex:1;background:none;border:none;color:var(--text);font-family:var(--mono);font-size:13px;font-weight:500;padding:0;}
.chapter-title-input:focus{outline:none;}
.chapter-title-input::placeholder{color:var(--muted);}
.chapter-del-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;padding:2px 5px;transition:color .12s;flex-shrink:0;}
.chapter-del-btn:hover{color:var(--danger);}
.chapter-body{padding:12px 14px;}
.chapter-textarea{width:100%;min-height:110px;background:var(--surface);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.7;padding:11px 13px;resize:vertical;transition:border-color .15s;}
.chapter-textarea:focus{outline:none;border-color:var(--amber-dim);}
.add-chapter-btn{display:flex;align-items:center;gap:8px;width:100%;background:none;border:1px dashed var(--border);border-radius:var(--radius);color:var(--muted);font-family:var(--mono);font-size:12px;padding:13px;cursor:pointer;transition:color .12s,border-color .12s;margin-top:14px;}
.add-chapter-btn:hover{color:var(--amber);border-color:var(--amber-dim);}
/* TOOLBAR */
.toolbar{position:fixed;bottom:0;left:240px;right:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:10px;z-index:50;}
.save-status{font-family:var(--mono);font-size:11px;color:var(--safe);}
.save-pending{color:var(--amber-dim);}
.btn-sm{background:none;color:var(--muted);border:1px solid var(--border);border-radius:4px;font-family:var(--mono);font-size:11px;padding:6px 14px;cursor:pointer;transition:color .12s,border-color .12s;}
.btn-sm:hover{color:var(--amber);border-color:var(--amber-dim);}
@media(max-width:600px){
  .sc-sidebar{display:none;}
  .toolbar{left:0;}
  .sc-editor-form{padding:16px 16px 80px;}
}
</style>
</head>
<body>
<header>
  <div><div class="logo">La Ville Morte</div><div class="header-title">Scenarios</div></div>
  <a href="mj.html" class="back-link">Compagnon MJ</a>
</header>
<div class="app">
  <div class="sc-sidebar">
    <div class="sc-sidebar-header">
      Scenarios
      <button class="sc-new-btn" onclick="newScenario()">+ Nouveau</button>
    </div>
    <div class="sc-list" id="sc-list"></div>
  </div>
  <div class="sc-editor" id="sc-editor">
    <div class="sc-editor-empty" id="sc-empty">Selectionnez ou creez un scenario</div>
    <div class="sc-editor-form" id="sc-form" style="display:none">
      <label class="field-label">Nom de la partie / session</label>
      <input class="session-title-input" id="session-title" type="text" placeholder="Ex : La Ville Morte - Session 4" oninput="schedSave()">
      <div class="chapters-list" id="chapters-list"></div>
      <button class="add-chapter-btn" onclick="addChapter()">+ Ajouter un chapitre</button>
    </div>
  </div>
</div>
<div class="toolbar" id="toolbar" style="display:none">
  <span class="save-status" id="save-status">Sauvegarde auto</span>
  <button class="btn-sm" onclick="exportTxt()">Export .txt</button>
  <button class="btn-sm" onclick="exportJson()">Export .json</button>
</div>
<script>
var STORAGE_KEY = 'jdr_scenarios_v2';
var currentId = null;
var saveTimer = null;
var chapterCount = 0;

function loadAll() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { return []; }
}
function saveAll(list) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

function renderList() {
  var list = loadAll();
  var el = document.getElementById('sc-list');
  el.innerHTML = '';
  if (!list.length) {
    el.innerHTML = '<div style="padding:12px;font-size:12px;color:var(--muted);font-style:italic">Aucun scenario</div>';
    return;
  }
  list.forEach(function(sc) {
    var div = document.createElement('div');
    div.className = 'sc-list-item' + (sc.id === currentId ? ' active' : '');
    div.onclick = function() { openScenario(sc.id); };
    var chapCount = (sc.chapters || []).length;
    var date = sc.updated ? new Date(sc.updated).toLocaleDateString('fr-FR') : '';
    div.innerHTML = '<button class="sc-del-btn" onclick="event.stopPropagation();deleteScenario('' + sc.id + '')" title="Supprimer">x</button>'
      + '<div class="sc-item-title">' + escH(sc.title || 'Sans titre') + '</div>'
      + '<div class="sc-item-meta">' + chapCount + ' chapitre' + (chapCount>1?'s':'') + (date ? ' · ' + date : '') + '</div>';
    el.appendChild(div);
  });
}

function openScenario(id) {
  currentId = id;
  var list = loadAll();
  var sc = list.find(function(s) { return s.id === id; });
  if (!sc) return;
  document.getElementById('sc-empty').style.display = 'none';
  document.getElementById('sc-form').style.display = '';
  document.getElementById('toolbar').style.display = '';
  document.getElementById('session-title').value = sc.title || '';
  document.getElementById('chapters-list').innerHTML = '';
  chapterCount = 0;
  (sc.chapters || []).forEach(function(ch) { addChapter(ch.title, ch.content); });
  if (!chapterCount) addChapter();
  renderList();
}

function newScenario() {
  var id = 'sc_' + Date.now();
  var list = loadAll();
  list.unshift({ id: id, title: '', chapters: [], updated: Date.now() });
  saveAll(list);
  openScenario(id);
}

function deleteScenario(id) {
  if (!confirm('Supprimer ce scenario ?')) return;
  var list = loadAll().filter(function(s) { return s.id !== id; });
  saveAll(list);
  if (currentId === id) {
    currentId = null;
    document.getElementById('sc-empty').style.display = '';
    document.getElementById('sc-form').style.display = 'none';
    document.getElementById('toolbar').style.display = 'none';
  }
  renderList();
}

function getCurrentData() {
  var chapters = [];
  document.querySelectorAll('.chapter-card').forEach(function(card, i) {
    chapters.push({
      title: card.querySelector('.chapter-title-input').value || '',
      content: card.querySelector('.chapter-textarea').value || ''
    });
  });
  return { title: document.getElementById('session-title').value || '', chapters: chapters, updated: Date.now() };
}

function saveScenario() {
  if (!currentId) return;
  var list = loadAll();
  var idx = list.findIndex(function(s) { return s.id === currentId; });
  var data = getCurrentData();
  data.id = currentId;
  if (idx >= 0) list[idx] = data;
  else list.unshift(data);
  saveAll(list);
  var s = document.getElementById('save-status');
  if (s) { s.textContent = 'Sauvegarde'; s.className = 'save-status'; }
  renderList();
}

function schedSave() {
  var s = document.getElementById('save-status');
  if (s) { s.textContent = 'En cours...'; s.className = 'save-status save-pending'; }
  clearTimeout(saveTimer);
  saveTimer = setTimeout(saveScenario, 700);
}

function addChapter(title, content) {
  chapterCount++;
  var n = chapterCount;
  var list = document.getElementById('chapters-list');
  var card = document.createElement('div');
  card.className = 'chapter-card';
  card.id = 'chapter-' + n;
  card.innerHTML = '<div class="chapter-header">'
    + '<span class="chapter-num">Chapitre ' + n + '</span>'
    + '<input class="chapter-title-input" type="text" placeholder="Titre (optionnel)" value="' + escH(title||'') + '" oninput="schedSave()">'
    + '<button class="chapter-del-btn" onclick="deleteChapter(' + n + ')" title="Supprimer">x</button>'
    + '</div><div class="chapter-body">'
    + '<textarea class="chapter-textarea" placeholder="Contenu..." oninput="schedSave()">' + escH(content||'') + '</textarea>'
    + '</div>';
  list.appendChild(card);
  if (!title && !content) { var ta = card.querySelector('.chapter-textarea'); if (ta) ta.focus(); }
}

function deleteChapter(n) {
  var card = document.getElementById('chapter-' + n);
  if (card) card.remove();
  schedSave();
}

function escH(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function exportTxt() {
  var data = getCurrentData();
  var lines = [data.title || 'Scenario', '='.repeat((data.title||'Scenario').length), ''];
  (data.chapters||[]).forEach(function(ch, i) {
    lines.push('--- ' + (ch.title || 'Chapitre ' + (i+1)) + ' ---');
    lines.push(ch.content || ''); lines.push('');
  });
  var blob = new Blob([lines.join('\n')], {type:'text/plain;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = ((data.title||'scenario').replace(/[^a-z0-9]/gi,'_')) + '.txt';
  a.click();
}

function exportJson() {
  var data = getCurrentData();
  var blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = ((data.title||'scenario').replace(/[^a-z0-9]/gi,'_')) + '.json';
  a.click();
}

document.addEventListener('DOMContentLoaded', function() {
  var list = loadAll();
  renderList();
  if (list.length) openScenario(list[0].id);
});
</script>
</body>
</html>
